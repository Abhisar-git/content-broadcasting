openapi: 3.0.3
info:
  title: Content Broadcasting System API
  version: 1.0.0
servers:
  - url: http://localhost:4000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /api/auth/register:
    post:
      summary: Register teacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: Teacher created
  /api/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login success
  /api/content:
    post:
      summary: Upload content (teacher)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, subject, file]
              properties:
                title:
                  type: string
                subject:
                  type: string
                description:
                  type: string
                startTime:
                  type: string
                  format: date-time
                endTime:
                  type: string
                  format: date-time
                rotationDurationMinutes:
                  type: integer
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Upload accepted
  /api/content/my:
    get:
      summary: List teacher contents
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: subject
          schema:
            type: string
      responses:
        "200":
          description: Content list
  /api/principal/content:
    get:
      summary: List all content (principal)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: subject
          schema:
            type: string
        - in: query
          name: teacherId
          schema:
            type: integer
      responses:
        "200":
          description: Content list
  /api/principal/content/pending:
    get:
      summary: List pending content (principal)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending content list
  /api/principal/content/{contentId}/approve:
    patch:
      summary: Approve content (principal)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contentId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
  /api/principal/content/{contentId}/reject:
    patch:
      summary: Reject content (principal)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: contentId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Rejected
  /api/content/live/{teacherPublicId}:
    get:
      summary: Public live content by teacher
      parameters:
        - in: path
          name: teacherPublicId
          required: true
          schema:
            type: string
        - in: query
          name: subject
          schema:
            type: string
      responses:
        "200":
          description: Live content response
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
